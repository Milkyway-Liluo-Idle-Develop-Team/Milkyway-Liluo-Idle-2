syntax = "proto3";

package mli.v1;

option go_package = "github.com/Milkyway-Liluo-Idle-Develop-Team/Milkyway-Liluo-Idle-2/backend/pb";

message Envelope {
  string id = 1;
  int32 opcode = 2;
  bytes payload = 3;
  Error error = 4;
}

message Error {
  string code = 1;
  string message = 2;
  map<string, string> fields = 3;
}
